<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SpareCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">
                <a href="index.html">SpareCare</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Cerca Professionisti</a></li>
                <li><a href="register.html">Registrati</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <div class="card" style="max-width: 500px; margin: 2rem auto;">
            <h2>Accedi a SpareCare</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Accedi</button>
            </form>
            <p style="margin-top: 1rem;">Non hai un account? <a href="register.html">Registrati qui</a></p>
        </div>
    </main>
    <footer class="container">
        <p>&copy; 2025 SpareCare. Tutti i diritti riservati.</p>
    </footer>
    <script src="app.js"></script>
    <script src="auth.js"></script>
</body>
</html>
