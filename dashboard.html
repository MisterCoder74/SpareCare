<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SpareCare</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">
                <a href="index.html">SpareCare</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Cerca Professionisti</a></li>
                <li><a href="dashboard.html" style="font-weight: bold;">Dashboard</a></li>
                <li><a href="#" id="logout-btn">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        <div class="dashboard-header">
            <h1>Il Tuo Profilo Professionale</h1>
            <p>Gestisci le tue informazioni, i servizi che offri e la tua disponibilità.</p>
        </div>

        <div class="grid-2">
            <div class="card">
                <h3>Informazioni Personali</h3>
                <form id="profile-form">
                    <div class="form-group">
                        <label>Foto Profilo</label>
                        <div class="photo-upload">
                            <img id="profile-photo-preview" src="https://via.placeholder.com/100x100?text=Foto" alt="Anteprima" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; margin-bottom: 1rem;">
                            <input type="file" id="photo-input" accept="image/*">
                        </div>
                    </div>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="first_name">Nome</label>
                            <input type="text" id="first_name" name="first_name" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="last_name">Cognome</label>
                            <input type="text" id="last_name" name="last_name" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="phone">Telefono</label>
                        <input type="tel" id="phone" name="phone" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="contact_email">Email di contatto</label>
                        <input type="email" id="contact_email" name="contact_email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="bio">Biografia / Descrizione</label>
                        <textarea id="bio" name="bio" class="form-control" rows="4"></textarea>
                    </div>

                    <h3>Località</h3>
                    <div class="grid-2">
                        <div class="form-group">
                            <label for="city">Città</label>
                            <input type="text" id="city" name="city" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label for="province">Provincia (Sigla)</label>
                            <input type="text" id="province" name="province" class="form-control" maxlength="2" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary">Salva Informazioni</button>
                </form>
            </div>

            <div>
                <div class="card">
                    <h3>Tariffe e Servizi</h3>
                    <form id="services-form">
                        <div class="grid-2">
                            <div class="form-group">
                                <label for="hourly_rate">Tariffa Oraria (€)</label>
                                <input type="number" id="hourly_rate" name="hourly_rate" class="form-control" min="0">
                            </div>
                            <div class="form-group">
                                <label for="daily_rate">Tariffa Giornaliera (€)</label>
                                <input type="number" id="daily_rate" name="daily_rate" class="form-control" min="0">
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Servizi Offerti</label>
                            <div class="services-grid">
                                <label class="checkbox-label">
                                    <input type="checkbox" name="services[]" value="assistenza_anziani">
                                    Assistenza Anziani
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="services[]" value="assistenza_disabili">
                                    Assistenza Disabili
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="services[]" value="baby_sitting">
                                    Baby Sitting
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="services[]" value="colf">
                                    Collaboratore Domestico
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="services[]" value="badante">
                                    Badante
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="services[]" value="fisioterapia">
                                    Fisioterapia a domicilio
                                </label>
                                <label class="checkbox-label">
                                    <input type="checkbox" name="services[]" value="infermieristica">
                                    Assistenza Infermieristica
                                </label>
                            </div>
                        </div>

                        <div class="form-group" style="margin-top: 1.5rem;">
                            <label class="checkbox-label">
                                <input type="checkbox" id="monthly_discount" name="monthly_discount" value="true">
                                <strong>Offro sconti per contratti mensili</strong>
                                <span style="display: block; margin-left: 1.5rem; color: var(--secondary-color); font-size: 0.9rem;">
                                    Mostra un badge "Sconti mensili" sulla tua scheda pubblica
                                </span>
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary">Aggiorna Servizi</button>
                    </form>
                </div>

                <div class="card">
                    <h3>Disponibilità</h3>
                    <form id="availability-form">
                        <div class="availability-grid">
                            <label class="checkbox-label">
                                <input type="checkbox" name="availability[morning]" value="true">
                                Mattina
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="availability[afternoon]" value="true">
                                Pomeriggio
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="availability[evening]" value="true">
                                Sera
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="availability[night]" value="true">
                                Notte
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="availability[weekend]" value="true">
                                Weekend
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" name="availability[holidays]" value="true">
                                Festivi
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Salva Disponibilità</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <footer class="container">
        <p>&copy; 2025 SpareCare. Tutti i diritti riservati.</p>
    </footer>
    <script src="app.js"></script>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
